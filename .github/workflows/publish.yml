name: Publish Package

on:
  release:
    types: [published]

jobs:
  check_security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GH repository
        uses: actions/checkout@v6
      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install deps
        run: npm ci
      - name: Audit deps
        continue-on-error: false
        run: | 
          npm audit
      - name: Check security of module
        continue-on-error: false
        run: |
          npm run security
  publish:
    needs: check_security
    runs-on: ubuntu-latest
    environment: sqlc
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          scope: '@mlagie'
        run: npm install -g npm@latest && npm ci && npm publish --provenance --access public