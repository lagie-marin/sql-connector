name: Publish Package

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
jobs:
  check_security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GH repository
        uses: actions/checkout@v6
      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install deps
        run: npm ci
      - name: Audit deps
        continue-on-error: false
        run: |
          npm audit
      - name: Check security of module
        continue-on-error: false
        run: |
          npm run security
  integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GH repository
        uses: actions/checkout@v6
      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install deps
        run: npm ci
      - name: Run integrity check
        continue-on-error: false
        run: |
          npm run test
  check_publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GH repository
        uses: actions/checkout@v6
      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install deps
        run: npm ci
      - name: Check if package can be published
        continue-on-error: false
        run: |
          npm run test:publish
  publish:
    needs:
      - check_security
      - integrity
      - check_publish
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      # 1. Récupérer le code source du dépôt
      - name: Checkout du code
        uses: actions/checkout@v6

      # 2. Configurer Node.js et pointer vers le registre GitHub Packages
      - name: Configurer Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22" # Modifiez selon votre version de Node
          registry-url: "https://npm.pkg.github.com"
          # Définit la portée (scope) automatique, ex: @votre-nom-utilisateur
          scope: "@mlagie"

      # 3. Installer les dépendances du projet
      - name: Installer les dépendances
        run: npm ci

      # 4. Publier le package
      # Le NODE_AUTH_TOKEN est automatiquement géré par l'action setup-node.
      # GITHUB_TOKEN possède les droits suffisants grâce au bloc permissions ci-dessus.
      - name: Publier sur GitHub Packages
        run: |
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_GITHUB_TOKEN }}
