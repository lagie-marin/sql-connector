name: Publish Package

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
jobs:
  check_security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GH repository
        uses: actions/checkout@v6
      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install deps
        run: npm ci
      - name: Audit deps
        continue-on-error: false
        run: |
          npm audit
      - name: Check security of module
        continue-on-error: false
        run: |
          npm run security
  integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GH repository
        uses: actions/checkout@v6
      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install deps
        run: npm ci
      - name: Run integrity check
        continue-on-error: false
        run: |
          npm run test
  check_publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GH repository
        uses: actions/checkout@v6
      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install deps
        run: npm ci
      - name: Check if package can be published
        continue-on-error: false
        run: |
          npm run test:publish
publish:
  needs:
    - check_security
    - integrity
    - check_publish
  if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
  runs-on: ubuntu-latest
  environment: sqlc
  permissions:
    contents: read
    id-token: write # Indispensable pour le flux Trusted Publisher (OIDC)

  steps:
    - uses: actions/checkout@v6

    # Utiliser Node 20 plutôt que Node 22 évite le bug interne d'npm lié à 'sigstore'
    # tout en restant parfaitement compatible avec la publication et la provenance.
    - uses: actions/setup-node@v6
      with:
        node-version: 20
        registry-url: "https://registry.npmjs.org"

    - name: Install dependencies and Publish
      run: |
        npm publish --provenance --access public --auth-type=oidc
