name: Publish Package

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
jobs:
  check_security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GH repository
        uses: actions/checkout@v6
      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install deps
        run: npm ci
      - name: Audit deps
        continue-on-error: false
        run: |
          npm audit
      - name: Check security of module
        continue-on-error: false
        run: |
          npm run security
  integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GH repository
        uses: actions/checkout@v6
      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install deps
        run: npm ci
      - name: Run integrity check
        continue-on-error: false
        run: |
          npm run test
  check_publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GH repository
        uses: actions/checkout@v6
      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install deps
        run: npm ci
      - name: Check if package can be published
        continue-on-error: false
        run: |
          npm run test:publish
  publish:
    needs: 
      - check_security
      - integrity
      - check_publish
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: sqlc
    permissions:
      contents: read
      id-token: write # Requis par la doc d'npm pour générer le jeton OIDC

    steps:
      - uses: actions/checkout@v6
      
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          # STRICTEMENT SANS 'registry-url' ni 'scope' comme l'indique la doc

      - name: Install and Publish using Trusted Publisher
        run: |
          # 1. Installer proprement vos dépendances avec l'environnement par défaut
          npm ci
          
          # 2. Publier via npx avec le client npm à jour requis par la documentation
          npx --package=npm@latest npm publish --provenance --access public